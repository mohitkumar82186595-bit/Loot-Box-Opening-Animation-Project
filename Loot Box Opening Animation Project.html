<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Loot Box Simulator</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#0f172a;
color:white;
overflow-x:hidden;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
text-align:center;
}

h1{
margin-bottom:20px;
font-size:3rem;
}

button{
padding:12px 30px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
background:#f59e0b;
color:white;
font-weight:bold;
margin:10px;
}

button:hover{
transform:scale(1.05);
}

.case{
width:900px;
max-width:100%;
height:150px;
margin:30px auto;
overflow:hidden;
border:4px solid gold;
border-radius:15px;
position:relative;
background:#111827;
}

.marker{
position:absolute;
left:50%;
top:0;
transform:translateX(-50%);
width:6px;
height:100%;
background:red;
z-index:5;
}

.roller{
display:flex;
align-items:center;
height:100%;
gap:10px;
transition:transform 6s cubic-bezier(.08,.6,.1,1);
}

.card{
min-width:120px;
height:120px;
border-radius:12px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:35px;
font-weight:bold;
}

.common{
background:#374151;
}

.rare{
background:#2563eb;
}

.epic{
background:#9333ea;
}

.legendary{
background:#f59e0b;
box-shadow:0 0 20px gold;
}

.reward{
font-size:2rem;
margin:20px;
min-height:50px;
}

.panels{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:30px;
}

.panel{
background:#1e293b;
padding:20px;
border-radius:15px;
}

.inventory-item{
padding:8px;
margin:5px;
border-radius:8px;
background:#334155;
}

.particle{
position:fixed;
width:8px;
height:8px;
background:gold;
border-radius:50%;
pointer-events:none;
animation:blast 1.5s linear forwards;
}

@keyframes blast{
from{
opacity:1;
transform:translate(0,0) scale(1);
}
to{
opacity:0;
transform:translate(var(--x),var(--y)) scale(0);
}
}

@media(max-width:768px){
.panels{
grid-template-columns:1fr;
}
}
</style>
</head>
<body>

<div class="container">

<h1>🎁 Ultimate Loot Box Simulator</h1>

<button onclick="openCase()">Open Loot Box</button>

<div class="case">
<div class="marker"></div>
<div class="roller" id="roller"></div>
</div>

<div class="reward" id="reward">
Open a case to win loot!
</div>

<div class="panels">

<div class="panel">
<h2>📦 Inventory</h2>
<div id="inventory"></div>
</div>

<div class="panel">
<h2>📜 Recent Wins</h2>
<div id="history"></div>
</div>

</div>

</div>

<script>

const items = [
{
emoji:"🪵",
name:"Wood Sword",
rarity:"common",
chance:50
},
{
emoji:"🛡️",
name:"Silver Shield",
rarity:"rare",
chance:30
},
{
emoji:"⚔️",
name:"Dragon Blade",
rarity:"epic",
chance:15
},
{
emoji:"👑",
name:"Phoenix Crown",
rarity:"legendary",
chance:5
}
];

let inventory =
JSON.parse(localStorage.getItem("inventory")) || [];

let history =
JSON.parse(localStorage.getItem("history")) || [];

const roller =
document.getElementById("roller");

function getReward(){

let rand=Math.random()*100;
let total=0;

for(let item of items){

total+=item.chance;

if(rand<=total){
return item;
}

}

return items[0];

}

function buildRoller(finalItem){

roller.innerHTML="";

let cards=[];

for(let i=0;i<60;i++){

let item=
items[Math.floor(Math.random()*items.length)];

cards.push(item);

}

cards[50]=finalItem;

cards.forEach(item=>{

roller.innerHTML+=`
<div class="card ${item.rarity}">
<div>${item.emoji}</div>
<small>${item.name}</small>
</div>
`;

});

}

function createExplosion(){

for(let i=0;i<120;i++){

const p=document.createElement("div");

p.className="particle";

p.style.left=window.innerWidth/2+"px";
p.style.top=window.innerHeight/2+"px";

p.style.setProperty(
'--x',
(Math.random()*800-400)+'px'
);

p.style.setProperty(
'--y',
(Math.random()*800-400)+'px'
);

document.body.appendChild(p);

setTimeout(()=>{
p.remove();
},1500);

}

}

function openCase(){

const reward=getReward();

buildRoller(reward);

roller.style.transition='none';
roller.style.transform='translateX(0px)';

setTimeout(()=>{

roller.style.transition=
'transform 6s cubic-bezier(.08,.6,.1,1)';

roller.style.transform=
'translateX(-6150px)';

},50);

setTimeout(()=>{

document.getElementById("reward").innerHTML=
`🎉 You Won: <b>${reward.emoji} ${reward.name}</b> (${reward.rarity.toUpperCase()})`;

inventory.push(reward);

history.unshift(
`${reward.emoji} ${reward.name}`
);

history=history.slice(0,10);

localStorage.setItem(
"inventory",
JSON.stringify(inventory)
);

localStorage.setItem(
"history",
JSON.stringify(history)
);

renderInventory();
renderHistory();

createExplosion();

},6200);

}

function renderInventory(){

const box=
document.getElementById("inventory");

box.innerHTML="";

inventory.forEach(item=>{

box.innerHTML+=`
<div class="inventory-item">
${item.emoji} ${item.name}
</div>
`;

});

}

function renderHistory(){

const box=
document.getElementById("history");

box.innerHTML="";

history.forEach(item=>{

box.innerHTML+=`
<div class="inventory-item">
${item}
</div>
`;

});

}

renderInventory();
renderHistory();

</script>

</body>
</html>
